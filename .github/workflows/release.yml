name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt6 SQLAlchemy rapidfuzz Pillow pillow-heif psd-tools
          pip install exifread mutagen pypdf python-docx openpyxl python-pptx
          pip install send2trash guessit requests requests-cache platformdirs
          pip install PyYAML

      - name: Build exe
        run: pyinstaller --clean --noconfirm UniFile.spec

      - name: Zip distribution
        shell: bash
        run: |
          cd dist
          powershell -Command "Compress-Archive -Path UniFile -DestinationPath UniFile-${{ github.ref_name }}-windows-x64.zip"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniFile-windows-x64
          path: dist/UniFile-${{ github.ref_name }}-windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Extract the changelog entry for this tag (section between headers).
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          python - <<'PY' > release_notes.md
          import re, os
          tag = os.environ.get("GITHUB_REF_NAME", "")
          version = tag[1:] if tag.startswith("v") else tag
          text = open("CHANGELOG.md", "r", encoding="utf-8").read()
          pat = re.compile(rf"(## \[v{re.escape(version)}\].*?)(?=\n## \[|\Z)", re.S)
          m = pat.search(text)
          print(m.group(1).strip() if m else f"Release {tag}")
          PY
          gh release create "$TAG" \
            "dist/UniFile-${TAG}-windows-x64.zip" \
            --title "UniFile $TAG" \
            --notes-file release_notes.md \
            --verify-tag
